<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>URL Shortener</h1>
            <p class="subtitle">Shorten long URLs and track clicks.</p>

            <form action="/shorten-form" method="post" class="shorten-form">
                <input type="text" name="original_url" placeholder="https://example.com" required>
                <button type="submit">Shorten</button>
            </form>

            {% if short_url %}
            <div class="result-box">
                <p class="label">Short URL</p>

                <div class="short-url-wrapper">
                    <a href="{{ short_url }}" target="_blank" id="shortUrl">{{ short_url }}</a>
                </div>

                <div class="actions">
                    <button type="button" id="copyButton" onclick="copyShortUrl()">Copy</button>
                    <a href="/stats/{{ short_code }}" target="_blank" class="stats-btn">View Stats</a>
                </div>

                <p class="original-url">
                    <strong>Original:</strong> {{ original_url }}
                </p>
            </div>
            {% endif %}

            {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
            {% endif %}
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
