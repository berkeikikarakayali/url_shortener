<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>

        <form action="/shorten-form" method="post" class="shorten-form">
            <input type="text" name="original_url" placeholder="https://example.com" required>
            <button type="submit">Shorten</button>
        </form>

        {% if short_url %}
        <div class="result">
            <p><strong>Short Link:</strong></p>
            <a href="{{ short_url }}" target="_blank" id="shortUrl">{{ short_url }}</a>

            <div class="result-actions">
                <button type="button" onclick="copyShortUrl()">Copy</button>
            </div>

            <div class="small">
                Original URL: {{ original_url }}
            </div>
            <div class="small">
                Statistics: <a href="/stats/{{ short_code }}" target="_blank">/stats/{{ short_code }}</a>
            </div>
        </div>
        {% endif %}

        {% if error %}
        <div class="error">
            {{ error }}
        </div>
        {% endif %}
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
